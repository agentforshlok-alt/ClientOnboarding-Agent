<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Client Onboarding — Intake</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Space+Grotesk:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<!-- Tidio live chat -->
<script src="//code.tidio.co/iaife6lkwprgbjssctkdb7tci2elqx9x.js" async></script>
<style>
  :root{
    --paper:#FFFFFF;
    --paper-dim:#F5F4F0;
    --ink:#101018;
    --ink-soft:#5B5B63;
    --line:#E3E2DD;
    --signal:#101018;
    --signal-dim:#FFF6D9;
    --gold:#FFC809;
    --gold-dim:#FFF6D9;
    --amber:#B8860B;
    --amber-dim:#FFF6D9;
    --rose:#B84A3E;
    --rose-dim:#FBEBE8;
    --green:#3E7A57;
    --green-dim:#E9F3EC;
    --radius:3px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--paper);
    color:var(--ink);
    font-family:'Space Grotesk',system-ui,sans-serif;
    -webkit-font-smoothing:antialiased;
  }
  .wrap{
    max-width:1180px;
    margin:0 auto;
    padding:28px 20px 60px;
  }
  header.top{
    display:flex;
    align-items:baseline;
    justify-content:space-between;
    border-bottom:1px solid var(--line);
    padding-bottom:16px;
    margin-bottom:24px;
    gap:12px;
    flex-wrap:wrap;
  }
  .brand-mark{
    font-family:'IBM Plex Mono',monospace;
    font-size:11px;
    letter-spacing:.14em;
    text-transform:uppercase;
    color:var(--ink-soft);
  }
  h1.masthead{
    font-family:'Archivo Black',serif;
    font-weight:500;
    font-size:clamp(26px,4vw,34px);
    margin:2px 0 0;
    letter-spacing:-.01em;
  }
  .doc-id{
    font-family:'IBM Plex Mono',monospace;
    font-size:11px;
    color:var(--ink-soft);
    text-align:right;
  }
  .grid{
    display:grid;
    grid-template-columns:1.15fr 1fr;
    gap:28px;
    align-items:start;
  }
  @media (max-width:900px){
    .grid{grid-template-columns:1fr;}
    .dossier{order:2;}
  }

  /* ---- Chat panel ---- */
  .panel{
    background:#fff;
    border:1px solid var(--line);
    border-radius:var(--radius);
    padding:0;
    position:relative;
  }
  .panel-head{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:14px 20px;
    border-bottom:1px solid var(--line);
    font-family:'IBM Plex Mono',monospace;
    font-size:11px;
    letter-spacing:.08em;
    text-transform:uppercase;
    color:var(--ink-soft);
  }
  .progress-track{
    height:3px;
    background:var(--paper-dim);
    position:relative;
    overflow:hidden;
  }
  .progress-fill{
    height:100%;
    background:var(--gold);
    width:0%;
    transition:width .4s ease;
  }
  .chat-body{
    padding:26px 24px 22px;
    min-height:420px;
    display:flex;
    flex-direction:column;
  }
  .category-tag{
    font-family:'IBM Plex Mono',monospace;
    font-size:10.5px;
    letter-spacing:.1em;
    text-transform:uppercase;
    color:var(--amber);
    margin-bottom:10px;
  }
  .question-text{
    font-family:'Archivo Black',serif;
    font-size:22px;
    font-weight:500;
    line-height:1.35;
    margin:0 0 6px;
  }
  .sub-note{
    font-size:13px;
    color:var(--ink-soft);
    margin:0 0 18px;
    line-height:1.5;
  }
  .faq-toggle{
    display:inline-flex;
    align-items:center;
    gap:6px;
    font-size:12px;
    color:var(--amber);
    cursor:pointer;
    border:none;
    background:none;
    padding:0;
    margin-bottom:16px;
    font-family:'Space Grotesk',sans-serif;
    font-weight:500;
  }
  .faq-toggle svg{width:13px;height:13px;}
  .faq-box{
    display:none;
    background:var(--gold-dim);
    border-left:2px solid var(--gold);
    padding:12px 14px;
    font-size:13px;
    line-height:1.55;
    color:#5c4315;
    margin-bottom:18px;
    border-radius:0 var(--radius) var(--radius) 0;
  }
  .faq-box.show{display:block;}
  textarea, input[type=text], input[type=email], input[type=tel]{
    width:100%;
    font-family:'Space Grotesk',sans-serif;
    font-size:15px;
    padding:12px 14px;
    border:1px solid var(--line);
    border-radius:var(--radius);
    background:var(--paper);
    color:var(--ink);
    resize:vertical;
  }
  textarea:focus, input:focus{
    outline:none;
    border-color:var(--gold);
    background:#fff;
    box-shadow:0 0 0 3px var(--gold-dim);
  }
  textarea{min-height:88px;}
  .btn-row{
    display:flex;
    flex-wrap:wrap;
    gap:8px;
    margin-top:16px;
  }
  .choice-btn{
    font-family:'Space Grotesk',sans-serif;
    font-size:14px;
    font-weight:500;
    padding:10px 16px;
    border-radius:var(--radius);
    border:1px solid var(--line);
    background:#fff;
    color:var(--ink);
    cursor:pointer;
    transition:border-color .15s, background .15s;
  }
  .choice-btn:hover{border-color:var(--ink);}
  .choice-btn.selected{
    border-color:var(--gold);
    background:var(--gold-dim);
  }
  .action-row{
    display:flex;
    gap:10px;
    margin-top:22px;
    flex-wrap:wrap;
    align-items:center;
  }
  .btn{
    font-family:'Space Grotesk',sans-serif;
    font-size:14px;
    font-weight:600;
    padding:11px 20px;
    border-radius:var(--radius);
    border:1px solid transparent;
    cursor:pointer;
  }
  .btn-primary{background:var(--ink);color:var(--paper);}
  .btn-primary:hover{background:#000;}
  .btn-ghost{background:none;color:var(--ink-soft);border-color:var(--line);}
  .btn-ghost:hover{color:var(--ink);border-color:var(--ink);}
  .link-btn{
    background:none;border:none;
    font-family:'Space Grotesk',sans-serif;
    font-size:13px;
    color:var(--ink-soft);
    text-decoration:underline;
    cursor:pointer;
    padding:0;
  }
  .link-btn:hover{color:var(--ink);}
  .delegate-form{
    display:none;
    margin-top:16px;
    padding:16px;
    background:var(--amber-dim);
    border-radius:var(--radius);
    border-left:2px solid var(--amber);
  }
  .delegate-form.show{display:block;}
  .delegate-form p{
    margin:0 0 10px;
    font-size:13px;
    color:#5c4315;
    font-weight:500;
  }
  .delegate-form input{margin-bottom:8px;}
  .stamp{
    font-family:'IBM Plex Mono',monospace;
    font-size:10px;
    letter-spacing:.08em;
    text-transform:uppercase;
    padding:3px 8px;
    border-radius:2px;
    display:inline-block;
  }
  .stamp.answered{background:var(--green-dim);color:var(--green);}
  .stamp.delegated{background:var(--amber-dim);color:var(--amber);}
  .stamp.skipped{background:var(--rose-dim);color:var(--rose);}

  /* ---- Dossier panel ---- */
  .dossier{
    background:var(--ink);
    color:var(--paper);
    border-radius:var(--radius);
    padding:22px 22px 8px;
    position:sticky;
    top:20px;
    max-height:86vh;
    overflow-y:auto;
  }
  .dossier-head{
    display:flex;
    justify-content:space-between;
    align-items:baseline;
    border-bottom:1px solid #3a3d45;
    padding-bottom:12px;
    margin-bottom:14px;
  }
  .dossier-head h2{
    font-family:'Archivo Black',serif;
    font-weight:500;
    font-size:17px;
    margin:0;
  }
  .dossier-head span{
    font-family:'IBM Plex Mono',monospace;
    font-size:10px;
    color:#9a9da5;
  }
  .dossier-cat{
    margin-bottom:16px;
  }
  .dossier-cat h3{
    font-family:'IBM Plex Mono',monospace;
    font-size:10px;
    letter-spacing:.1em;
    text-transform:uppercase;
    color:#8b8ea3;
    margin:0 0 8px;
  }
  .dossier-item{
    font-size:12.5px;
    line-height:1.5;
    padding:8px 0;
    border-bottom:1px dashed #33363d;
  }
  .dossier-item:last-child{border-bottom:none;}
  .dossier-item .q{color:#9a9da5;margin-bottom:3px;}
  .dossier-item .a{color:var(--paper);}
  .dossier-item .a.empty{color:#5c5f68;font-style:italic;}
  .dossier-item .tag{
    font-family:'IBM Plex Mono',monospace;
    font-size:9px;
    letter-spacing:.06em;
    text-transform:uppercase;
    padding:2px 6px;
    border-radius:2px;
    margin-top:4px;
    display:inline-block;
  }
  .tag.answered{background:#1f3d2c;color:#7fd8a3;}
  .tag.delegated{background:#3d3016;color:#e8b968;}
  .tag.skipped{background:#3d2320;color:#e89187;}

  /* ---- Review screen ---- */
  .review-section{margin-bottom:26px;}
  .review-section h3{
    font-family:'IBM Plex Mono',monospace;
    font-size:11px;
    letter-spacing:.08em;
    text-transform:uppercase;
    color:var(--ink-soft);
    margin:0 0 10px;
    padding-bottom:8px;
    border-bottom:1px solid var(--line);
  }
  .review-row{
    display:flex;
    justify-content:space-between;
    gap:14px;
    padding:9px 0;
    border-bottom:1px dashed var(--line);
    font-size:13.5px;
  }
  .review-row .rq{color:var(--ink-soft);flex:1;}
  .review-row .ra{flex:1;font-weight:500;}
  .delegate-card{
    background:var(--amber-dim);
    border-radius:var(--radius);
    padding:14px 16px;
    margin-bottom:10px;
  }
  .delegate-card .name{font-weight:600;font-size:14px;margin-bottom:2px;}
  .delegate-card .contact{font-size:12.5px;color:#7a5a12;margin-bottom:8px;}
  .delegate-card ul{margin:0 0 10px;padding-left:18px;font-size:13px;}
  .final-actions{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
    margin-top:24px;
    padding-top:20px;
    border-top:1px solid var(--line);
  }
  .toast{
    position:fixed;
    bottom:24px;
    left:50%;
    transform:translateX(-50%) translateY(10px);
    background:var(--ink);
    color:var(--paper);
    padding:11px 18px;
    border-radius:var(--radius);
    font-size:13px;
    opacity:0;
    pointer-events:none;
    transition:opacity .25s, transform .25s;
    font-family:'Space Grotesk',sans-serif;
    z-index:50;
  }
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>
<div class="wrap">
  <header class="top">
    <div>
      <div class="brand-mark">Studio — Client Intake</div>
      <h1 class="masthead">Onboarding Dossier</h1>
    </div>
    <div class="doc-id" id="docId"></div>
  </header>

  <div class="grid">
    <div class="panel">
      <div class="panel-head">
        <span id="stepLabel">Question 1 of 1</span>
        <span id="catLabel">—</span>
      </div>
      <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
      <div class="chat-body" id="chatBody"></div>
    </div>

    <aside class="dossier" id="dossier">
      <div class="dossier-head">
        <h2>Live Brief</h2>
        <span id="dossierStatus">0 / 0 filled</span>
      </div>
      <div id="dossierBody"></div>
    </aside>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
/* ---------------- DATA ---------------- */
const QUESTIONS = [
  {id:"client_name", cat:"Basics", q:"What's the client / company name for this engagement?", type:"text", placeholder:"e.g. Northwind Foods"},
  {id:"brand_overview", cat:"Basics", q:"Give us a one-line description of the business and what it does.", type:"textarea", placeholder:"Who you are, what you sell, who you sell to..."},
  {id:"target_audience", cat:"Basics", q:"Who's the target audience for this brand?", type:"textarea"},
  {id:"competitors", cat:"Basics", q:"Any key competitors or reference brands we should know about?", type:"textarea"},
  {id:"brand_assets", cat:"Basics", q:"Do you have existing brand guidelines or an asset library we can access?", type:"buttons", options:["Yes — I'll share a link","No, none exist yet","Not sure"],
    faq:"If there's no formal guideline yet, that's fine — we'll flag it as a first-phase deliverable rather than assuming it exists."},

  {id:"team_roster", cat:"Team & Escalation", q:"Who are the key people on your side we'll work with day-to-day?", type:"textarea",
    sub:"Name, title/designation, and seniority level for each.", placeholder:"e.g. Priya Shah, Marketing Director, Senior"},
  {id:"primary_poc", cat:"Team & Escalation", q:"Who is the single point of contact (POC) for day-to-day approvals?", type:"text"},
  {id:"escalation_matrix", cat:"Team & Escalation", q:"If something is urgent or blocked, who do we escalate to — and in what order?", type:"textarea",
    faq:"An escalation matrix just means: if your primary contact is unavailable, who's next (L1 → L2 → L3)? It keeps things moving without emails sitting unanswered."},

  {id:"po_process", cat:"Finance & Approvals", q:"Do you require a Purchase Order (PO) before work begins? If yes, what's the process and typical turnaround?", type:"textarea",
    faq:"A PO (Purchase Order) is your internal approval document authorizing spend — usually needed before we can invoice against work."},
  {id:"estimate_cadence", cat:"Finance & Approvals", q:"How often should we raise cost estimates — per project, per sprint, or monthly?", type:"buttons", options:["Per project","Per sprint","Monthly","Not sure"]},
  {id:"invoice_terms", cat:"Finance & Approvals", q:"What's your invoicing cadence and payment terms?", type:"text", placeholder:"e.g. Monthly, Net 30"},
  {id:"finance_poc", cat:"Finance & Approvals", q:"Who is the brand-side POC who approves SOWs and issues POs?", type:"text"},

  {id:"scope_deliverables", cat:"Scope of Work", q:"What are the agreed deliverables, channels, and frequency for this engagement?", type:"textarea"},
  {id:"out_of_scope", cat:"Scope of Work", q:"What's explicitly out of scope for this phase?", type:"textarea"},
  {id:"change_request", cat:"Scope of Work", q:"If something comes up outside the original SOW, how should we get it approved?", type:"buttons", options:["Formal change request doc","Verbal approval is fine","Case-by-case","Not sure"]},

  {id:"reporting_cadence", cat:"Operational Cadences", q:"How often do you want status reports, and in what format?", type:"text", placeholder:"e.g. Weekly email, monthly deck"},
  {id:"review_cadence", cat:"Operational Cadences", q:"What's your review cadence — monthly check-ins, quarterly business reviews (QBRs), or both?", type:"buttons", options:["Monthly check-ins","Quarterly (QBR)","Both","Not sure"]},
  {id:"review_attendees", cat:"Operational Cadences", q:"Who needs to be in those review meetings from your side?", type:"textarea"},

  {id:"tracker_location", cat:"Scope Tracker", q:"Where should the live SOW / scope tracker live?", type:"buttons", options:["Your tool","Our tool","Shared sheet","Not sure"]},
  {id:"tracker_owner", cat:"Scope Tracker", q:"Who's responsible for keeping the tracker updated on your end?", type:"text"},
  {id:"file_platform", cat:"Scope Tracker", q:"Preferred platform for sharing files and assets?", type:"buttons", options:["Google Drive","Dropbox","SharePoint","Other"]},

  {id:"pm_hierarchy", cat:"Project Setup", q:"Should deliverables be tracked by project, by channel, or by campaign?", type:"buttons", options:["By project","By channel","By campaign","Not sure"],
    faq:"This sets up how we structure things in the project tool — Brand → Deliverable → Project — so reporting lines up with how you actually think about the work."},
  {id:"naming_convention", cat:"Project Setup", q:"What's the correct naming convention for your brand(s) and sub-brands?", type:"text"},
  {id:"pm_tool", cat:"Project Setup", q:"Do you have an existing project management tool you'd like us to work inside of?", type:"text", placeholder:"e.g. Asana, Monday, or 'use yours'"},

  {id:"kpis", cat:"KPIs & Measurement", q:"What does success look like for this engagement — specific KPIs?", type:"textarea", placeholder:"e.g. reach, conversion rate, engagement"},
  {id:"dashboard", cat:"KPIs & Measurement", q:"Do you have an existing measurement dashboard, or should we build/recommend one?", type:"buttons", options:["We have one","Please build one","Not sure yet"]},
  {id:"data_access", cat:"KPIs & Measurement", q:"Who should have access to performance data, and how often should it refresh?", type:"textarea"},

  {id:"hiring_needed", cat:"Hiring", q:"Will a dedicated account team be staffed for this engagement?", type:"buttons", options:["Yes","No","Not sure"]},
  {id:"hiring_managers", cat:"Hiring", q:"Who are the hiring managers on your side we should coordinate with?", type:"text"},
  {id:"interview_stakeholders", cat:"Hiring", q:"Who from your team should be involved in interviewing candidates for this account?", type:"text"},

  {id:"final_notes", cat:"Wrap-up", q:"Anything else we should know before kicking off?", type:"textarea"}
];

const CATEGORIES = [...new Set(QUESTIONS.map(q=>q.cat))];

/* ---------------- STATE ---------------- */
let idx = 0;
let selectedChoice = null;
const answers = {}; // id -> {status: answered|delegated|skipped, value, delegate:{name,email,phone}}

const chatBody = document.getElementById('chatBody');
const stepLabel = document.getElementById('stepLabel');
const catLabel = document.getElementById('catLabel');
const progressFill = document.getElementById('progressFill');
const dossierBody = document.getElementById('dossierBody');
const dossierStatus = document.getElementById('dossierStatus');
const toast = document.getElementById('toast');

document.getElementById('docId').textContent = 'DOC-' + new Date().toISOString().slice(0,10).replace(/-/g,'');

function showToast(msg){
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(()=>toast.classList.remove('show'), 2200);
}

function render(){
  if(idx >= QUESTIONS.length){ renderReview(); return; }
  const q = QUESTIONS[idx];
  selectedChoice = null;
  stepLabel.textContent = `Question ${idx+1} of ${QUESTIONS.length}`;
  catLabel.textContent = q.cat;
  progressFill.style.width = ((idx)/QUESTIONS.length*100) + '%';

  let inputHtml = '';
  if(q.type === 'textarea'){
    inputHtml = `<textarea id="answerInput" placeholder="${q.placeholder||'Type your answer...'}"></textarea>`;
  } else if(q.type === 'text'){
    inputHtml = `<input type="text" id="answerInput" placeholder="${q.placeholder||'Type your answer...'}">`;
  } else if(q.type === 'buttons'){
    inputHtml = `<div class="btn-row" id="choiceRow">` +
      q.options.map((opt,i)=>`<button class="choice-btn" data-val="${opt.replace(/"/g,'&quot;')}" onclick="selectChoice(this)">${opt}</button>`).join('') +
      `</div>`;
  }

  chatBody.innerHTML = `
    <div class="category-tag">${q.cat}</div>
    <p class="question-text">${q.q}</p>
    ${q.sub ? `<p class="sub-note">${q.sub}</p>` : ''}
    ${q.faq ? `
      <button class="faq-toggle" onclick="toggleFaq(this)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4M12 8h.01"/></svg>
        Why do we need this?
      </button>
      <div class="faq-box">${q.faq}</div>
    ` : ''}
    ${inputHtml}
    <div class="action-row">
      <button class="btn btn-primary" onclick="submitAnswer()">Continue</button>
      <button class="link-btn" onclick="showDelegateForm()">Not sure — someone else handles this</button>
      <button class="link-btn" onclick="skipQuestion()">Skip for now</button>
    </div>
    <div class="delegate-form" id="delegateForm">
      <p>Who can answer this instead? We'll flag it for follow-up.</p>
      <input type="text" id="delName" placeholder="Full name">
      <input type="email" id="delEmail" placeholder="Email address">
      <input type="tel" id="delPhone" placeholder="Phone number (optional)">
      <button class="btn btn-primary" onclick="submitDelegate()" style="margin-right:8px;">Save & continue</button>
      <button class="link-btn" onclick="hideDelegateForm()">Cancel</button>
    </div>
  `;
  renderDossier();
}

function toggleFaq(btn){
  const box = btn.nextElementSibling;
  box.classList.toggle('show');
}

function selectChoice(btn){
  document.querySelectorAll('#choiceRow .choice-btn').forEach(b=>b.classList.remove('selected'));
  btn.classList.add('selected');
  selectedChoice = btn.dataset.val;
}

function showDelegateForm(){
  document.getElementById('delegateForm').classList.add('show');
}
function hideDelegateForm(){
  document.getElementById('delegateForm').classList.remove('show');
}

function submitAnswer(){
  const q = QUESTIONS[idx];
  let val = '';
  if(q.type === 'buttons'){
    val = selectedChoice;
    if(!val){ showToast('Pick an option or skip this one'); return; }
  } else {
    const el = document.getElementById('answerInput');
    val = el.value.trim();
    if(!val){ showToast('Add an answer, or use skip / delegate'); return; }
  }
  answers[q.id] = {status:'answered', value: val, cat:q.cat, q:q.q};
  idx++;
  render();
}

function submitDelegate(){
  const q = QUESTIONS[idx];
  const name = document.getElementById('delName').value.trim();
  const email = document.getElementById('delEmail').value.trim();
  const phone = document.getElementById('delPhone').value.trim();
  if(!name || !email){ showToast('Name and email are needed to follow up'); return; }
  answers[q.id] = {status:'delegated', delegate:{name,email,phone}, cat:q.cat, q:q.q};
  idx++;
  render();
}

function skipQuestion(){
  const q = QUESTIONS[idx];
  answers[q.id] = {status:'skipped', cat:q.cat, q:q.q};
  idx++;
  render();
}

/* ---------------- DOSSIER (live sidebar) ---------------- */
function renderDossier(){
  let filled = Object.keys(answers).length;
  dossierStatus.textContent = `${filled} / ${QUESTIONS.length} filled`;
  let html = '';
  CATEGORIES.forEach(cat=>{
    const items = QUESTIONS.filter(q=>q.cat===cat);
    const hasAny = items.some(q=>answers[q.id]);
    html += `<div class="dossier-cat"><h3>${cat}</h3>`;
    items.forEach(q=>{
      const a = answers[q.id];
      if(!a){
        html += `<div class="dossier-item"><div class="q">${q.q}</div><div class="a empty">— pending —</div></div>`;
      } else if(a.status === 'answered'){
        html += `<div class="dossier-item"><div class="q">${q.q}</div><div class="a">${escapeHtml(a.value)}</div><span class="tag answered">Answered</span></div>`;
      } else if(a.status === 'delegated'){
        html += `<div class="dossier-item"><div class="q">${q.q}</div><div class="a empty">Delegated to ${escapeHtml(a.delegate.name)}</div><span class="tag delegated">Delegated</span></div>`;
      } else {
        html += `<div class="dossier-item"><div class="q">${q.q}</div><div class="a empty">Skipped</div><span class="tag skipped">Skipped</span></div>`;
      }
    });
    html += `</div>`;
  });
  dossierBody.innerHTML = html;
}

function escapeHtml(str){
  const d = document.createElement('div');
  d.textContent = str;
  return d.innerHTML;
}

/* ---------------- REVIEW SCREEN ---------------- */
function renderReview(){
  stepLabel.textContent = 'Complete';
  catLabel.textContent = 'Review';
  progressFill.style.width = '100%';

  const answered = QUESTIONS.filter(q=>answers[q.id] && answers[q.id].status==='answered');
  const delegated = QUESTIONS.filter(q=>answers[q.id] && answers[q.id].status==='delegated');
  const skipped = QUESTIONS.filter(q=>answers[q.id] && answers[q.id].status==='skipped');

  // group delegated by delegate email
  const byDelegate = {};
  delegated.forEach(q=>{
    const d = answers[q.id].delegate;
    if(!byDelegate[d.email]) byDelegate[d.email] = {name:d.name, email:d.email, phone:d.phone, items:[]};
    byDelegate[d.email].items.push(q.q);
  });

  let delegateHtml = '';
  if(Object.keys(byDelegate).length){
    delegateHtml = Object.values(byDelegate).map(d=>`
      <div class="delegate-card">
        <div class="name">${escapeHtml(d.name)}</div>
        <div class="contact">${escapeHtml(d.email)}${d.phone ? ' · '+escapeHtml(d.phone) : ''}</div>
        <ul>${d.items.map(i=>`<li>${escapeHtml(i)}</li>`).join('')}</ul>
        <button class="btn btn-ghost" onclick="emailDelegate('${encodeURIComponent(d.email)}','${encodeURIComponent(d.name)}',${JSON.stringify(d.items).replace(/"/g,'&quot;')})">Draft follow-up email</button>
      </div>
    `).join('');
  } else {
    delegateHtml = `<p style="font-size:13px;color:var(--ink-soft);">No items were delegated — nice, everything was answered directly.</p>`;
  }

  chatBody.innerHTML = `
    <p class="category-tag">Intake complete</p>
    <p class="question-text" style="margin-bottom:20px;">Here's the brief — review, then send it off.</p>

    <div class="review-section">
      <h3>Answered (${answered.length})</h3>
      ${answered.map(q=>`<div class="review-row"><div class="rq">${q.q}</div><div class="ra">${escapeHtml(answers[q.id].value)}</div></div>`).join('') || '<p style="font-size:13px;color:var(--ink-soft);">None yet.</p>'}
    </div>

    <div class="review-section">
      <h3>Needs follow-up — delegated (${delegated.length})</h3>
      ${delegateHtml}
    </div>

    <div class="review-section">
      <h3>Skipped — open items (${skipped.length})</h3>
      ${skipped.map(q=>`<div class="review-row"><div class="rq">${q.q}</div><div class="ra" style="color:var(--rose);">Pending</div></div>`).join('') || '<p style="font-size:13px;color:var(--ink-soft);">None — everything was addressed.</p>'}
    </div>

    <div class="final-actions">
      <button class="btn btn-primary" onclick="downloadBrief()">Download brief (.txt)</button>
      <button class="btn btn-ghost" onclick="copyBrief()">Copy to clipboard</button>
      <button class="btn btn-ghost" onclick="emailAgency()">Email brief to agency lead</button>
      <button class="btn btn-ghost" onclick="restart()">Start over</button>
    </div>
  `;
  renderDossier();
}

function buildBriefText(){
  let out = `CLIENT ONBOARDING BRIEF\nGenerated ${new Date().toLocaleString()}\n\n`;
  CATEGORIES.forEach(cat=>{
    const items = QUESTIONS.filter(q=>q.cat===cat && answers[q.id]);
    if(!items.length) return;
    out += `\n== ${cat.toUpperCase()} ==\n`;
    items.forEach(q=>{
      const a = answers[q.id];
      out += `\nQ: ${q.q}\n`;
      if(a.status==='answered') out += `A: ${a.value}\n`;
      else if(a.status==='delegated') out += `A: [DELEGATED to ${a.delegate.name}, ${a.delegate.email}${a.delegate.phone ? ', '+a.delegate.phone : ''}]\n`;
      else out += `A: [SKIPPED — open item]\n`;
    });
  });
  return out;
}

function downloadBrief(){
  const blob = new Blob([buildBriefText()], {type:'text/plain'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'onboarding-brief.txt';
  a.click();
  URL.revokeObjectURL(url);
  showToast('Brief downloaded');
}

function copyBrief(){
  navigator.clipboard.writeText(buildBriefText()).then(()=>showToast('Brief copied to clipboard'));
}

function emailAgency(){
  const body = buildBriefText();
  const subject = 'New Client Onboarding Brief';
  window.location.href = `mailto:?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body.slice(0,1800))}`;
}

function emailDelegate(emailEnc, nameEnc, items){
  const email = decodeURIComponent(emailEnc);
  const name = decodeURIComponent(nameEnc);
  const subject = `Quick input needed — client onboarding`;
  const body = `Hi ${name},\n\nWe're setting up the onboarding brief and were told you're the right person for the following:\n\n${items.map(i=>'- '+i).join('\n')}\n\nCould you reply with answers when you get a chance?\n\nThanks!`;
  window.location.href = `mailto:${email}?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;
}

function restart(){
  idx = 0;
  Object.keys(answers).forEach(k=>delete answers[k]);
  render();
}

render();
</script>
</body>
</html>
